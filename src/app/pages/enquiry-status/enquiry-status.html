<section class="home-page p-6">
    <div class="mx-auto max-w-7xl space-y-6 dashboard-shell">
        <div class="neon-orb neon-orb--pink"></div>
        <div class="neon-orb neon-orb--cyan"></div>
        <div class="neon-grid"></div>

        <section class="rounded-xl border border-slate-700 bg-slate-900/60 p-4 shadow-lg">
            <h1 class="text-3xl font-bold text-white">Enquiry Status</h1>
            <p class="mt-1 text-sm text-slate-300">
                Track enquiry progress by status, category, and follow-up timeline.
            </p>
            <div class="mt-3 flex flex-wrap gap-2 text-xs">
                <span class="rounded-full border border-cyan-400/30 bg-cyan-500/10 px-3 py-1 text-cyan-200">
                    Total: {{ getTotalCount() }}
                </span>

                <span class="rounded-full border border-violet-400/30 bg-violet-500/10 px-3 py-1 text-violet-200">
                    Visible: {{ visibleCount }}
                </span>

                @if (isAdmin()) {
                <span class="rounded-full border border-emerald-400/30 bg-emerald-500/10 px-3 py-1 text-emerald-200">
                    Admin View
                </span>
                }
                @if (isUser()) {
                <span class="rounded-full border border-amber-400/30 bg-amber-500/10 px-3 py-1 text-amber-200">
                    User View
                </span>
                }
            </div>


            <section class="rounded-xl border border-slate-700 bg-slate-900/60 p-4 shadow-lg">
                <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-4">
                    <div>
                        <label
                            class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-300">Search</label>
                        <input type="text" [(ngModel)]="filters.search" (input)="applyFilters()"
                            placeholder="Enquiry ID, name, email, phone"
                            class="w-full rounded-md border border-slate-600 bg-slate-950/70 px-3 py-2 text-sm text-white outline-none transition focus:border-cyan-400" />
                    </div>

                    <div>
                        <label
                            class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-300">Status</label>
                        <select [(ngModel)]="filters.statusId" (change)="applyFilters()"
                            class="w-full rounded-md border border-slate-600 bg-slate-950/70 px-3 py-2 text-sm text-white outline-none transition focus:border-cyan-400">
                            <option value="all">All Status</option>
                            @for (status of statuses; track status.statusId) {
                            <option [value]="status.statusId">{{ status.statusName }}</option>
                            }
                        </select>
                    </div>

                    <div>
                        <label
                            class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-300">Category</label>
                        <select [(ngModel)]="filters.categoryId" (change)="applyFilters()"
                            class="w-full rounded-md border border-slate-600 bg-slate-950/70 px-3 py-2 text-sm text-white outline-none transition focus:border-cyan-400">
                            <option value="all">All Category</option>
                            @for (category of categories; track category.categoryId) {
                            <option [value]="category.categoryId">{{ category.categoryName }}</option>
                            }
                        </select>
                    </div>
                    <div>
                        <label
                            class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-300">Converted</label>
                        <div class="flex gap-2">
                            <select [(ngModel)]="filters.converted" (change)="applyFilters()"
                                class="w-full rounded-md border border-slate-600 bg-slate-950/70 px-3 py-2 text-sm text-white outline-none transition focus:border-cyan-400">
                                <option value="all">All</option>
                                <option value="yes">Converted</option>
                                <option value="no">Not Converted</option>
                            </select>
                            <button type="button" (click)="clearFilters()"
                                class="rounded-md border border-slate-500/70 bg-slate-700/40 px-3 py-2 text-xs font-semibold text-slate-100 transition hover:bg-slate-700/65">
                                Clear
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </section>
